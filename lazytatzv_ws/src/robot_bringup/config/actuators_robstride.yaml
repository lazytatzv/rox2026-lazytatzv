# Robstride (AT Protocol) Actuator Settings
/serial_gateway:
  ros__parameters:
    serial_port: "/dev/ttyUSB1"
    baud_rate: 921600

/wheel_speeds_dispatcher:
  ros__parameters:
    # Match motor node's private namespace ~/velocity_command
    front_left_topic: "/front_left_motor/velocity_command"
    front_right_topic: "/front_right_motor/velocity_command"
    rear_left_topic: "/rear_left_motor/velocity_command"
    rear_right_topic: "/rear_right_motor/velocity_command"

# Individual Motor Parameters (Robstride)
/front_left_motor:
  ros__parameters:
    motor_id: 0x0C
    joint_name: "front_left_wheel_joint"
    invert_direction: false
    max_speed_limit_percentage: 50.0
    topic_tx_queue: "/serial_bus/tx_queue"
    topic_rx_queue: "/serial_bus/rx_queue"

/front_right_motor:
  ros__parameters:
    motor_id: 0x14
    joint_name: "front_right_wheel_joint"
    invert_direction: true
    max_speed_limit_percentage: 50.0
    topic_tx_queue: "/serial_bus/tx_queue"
    topic_rx_queue: "/serial_bus/rx_queue"

/rear_left_motor:
  ros__parameters:
    motor_id: 0x1C
    joint_name: "rear_left_wheel_joint"
    invert_direction: false
    max_speed_limit_percentage: 50.0
    topic_tx_queue: "/serial_bus/tx_queue"
    topic_rx_queue: "/serial_bus/rx_queue"

/rear_right_motor:
  ros__parameters:
    motor_id: 0x24
    joint_name: "rear_right_wheel_joint"
    invert_direction: true
    max_speed_limit_percentage: 50.0
    topic_tx_queue: "/serial_bus/tx_queue"
    topic_rx_queue: "/serial_bus/rx_queue"
