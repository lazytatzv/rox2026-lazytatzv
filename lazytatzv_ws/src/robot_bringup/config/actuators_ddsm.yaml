# DDSM115 (Binary Protocol) Actuator Settings
/serial_gateway:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 115200

/wheel_speeds_dispatcher:
  ros__parameters:
    front_left_topic: "/front_left_motor/velocity_command"
    front_right_topic: "/front_right_motor/velocity_command"
    rear_left_topic: "/rear_left_motor/velocity_command"
    rear_right_topic: "/rear_right/velocity_command"

# Individual Motor Parameters (DDSM115)
/front_left_motor:
  ros__parameters:
    motor_id: 1
    joint_name: "front_left_wheel_joint"
    topic_tx_queue: "/serial_bus/tx_queue"
    topic_rx_queue: "/serial_bus/rx_queue"

/front_right_motor:
  ros__parameters:
    motor_id: 2
    joint_name: "front_right_wheel_joint"
    topic_tx_queue: "/serial_bus/tx_queue"
    topic_rx_queue: "/serial_bus/rx_queue"

/rear_left_motor:
  ros__parameters:
    motor_id: 3
    joint_name: "rear_left_wheel_joint"
    topic_tx_queue: "/serial_bus/tx_queue"
    topic_rx_queue: "/serial_bus/rx_queue"

/rear_right_motor:
  ros__parameters:
    motor_id: 4
    joint_name: "rear_right_wheel_joint"
    topic_tx_queue: "/serial_bus/tx_queue"
    topic_rx_queue: "/serial_bus/rx_queue"
